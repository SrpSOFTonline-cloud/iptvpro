<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Shovon IPTV Pro</title>
<meta name="description" content="Shovon IPTV Pro - Watch Live TV Channels">
<meta name="theme-color" content="#0a0a1a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📺</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--bg2:#111128;--bg3:#1a1a3a;--text:#f0f0f5;--text2:#a0a0b5;--purple:#8b5cf6;--purple-dim:rgba(139,92,246,.15);--purple-glow:rgba(139,92,246,.35);--glass:rgba(255,255,255,.04);--glass2:rgba(255,255,255,.08);--glass3:rgba(255,255,255,.12);--radius:1rem;--radius-sm:.6rem;--radius-xs:.4rem;--shadow:0 4px 24px rgba(0,0,0,.4)}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;overflow:hidden;line-height:1.4}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--purple);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#a78bfa}
input,button,select{font-family:inherit}
button{cursor:pointer;border:none;background:none;color:inherit}
img{display:block}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInRight{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 4px var(--purple-glow)}50%{box-shadow:0 0 16px var(--purple-glow),0 0 32px rgba(139,92,246,.15)}}
@keyframes bufferBar{0%{width:0}100%{width:100%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes breathe{0%,100%{opacity:.6}50%{opacity:1}}

.animate-fade{animation:fadeIn .4s ease}
.animate-slide-up{animation:slideInUp .4s ease}
.animate-slide-right{animation:slideInRight .4s ease}

/* App Layout */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Header */
.header{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;z-index:20;flex-wrap:wrap}
.logo-area{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.logo-icon{font-size:1.4rem;filter:drop-shadow(0 0 6px var(--purple-glow))}
.logo-text{font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,#a78bfa,#60a5fa,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.ch-count{background:var(--purple);color:#fff;font-size:.65rem;font-weight:700;padding:.15rem .45rem;border-radius:99px;white-space:nowrap}
.search-box{flex:1;min-width:120px;max-width:280px;position:relative}
.search-box input{width:100%;padding:.4rem .7rem .4rem 2rem;background:var(--glass2);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);color:var(--text);font-size:.8rem;outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--purple)}
.search-box input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--text2);font-size:.8rem}
.nav-btns{display:flex;gap:.3rem;flex-shrink:0}
.nav-btn{width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;background:var(--glass2);border-radius:var(--radius-xs);font-size:.75rem;font-weight:700;transition:all .2s}
.nav-btn:hover,.nav-btn:active{background:var(--purple);color:#fff}

/* Main Content */
.main{display:flex;flex:1;overflow:hidden;position:relative}

/* Left Panel - Player */
.left-panel{flex:8;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Video Player */
.player-wrap{position:relative;background:#000;aspect-ratio:16/9;max-height:50vh;flex-shrink:0;overflow:hidden}
.player-wrap video{width:100%;height:100%;object-fit:contain;background:#000}
.player-wrap video.zoom-mode{object-fit:cover}

/* Buffer bar */
.buffer-bar{position:absolute;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--purple),#60a5fa);z-index:10;transition:width .3s;opacity:0}
.buffer-bar.active{opacity:1;animation:bufferBar 3s linear infinite}

/* Controls overlay */
.controls-overlay{position:absolute;bottom:0;left:0;right:0;padding:.5rem .75rem;background:linear-gradient(transparent,rgba(0,0,0,.85));display:flex;align-items:center;gap:.5rem;z-index:15;opacity:0;transition:opacity .3s;flex-wrap:wrap}
.player-wrap:hover .controls-overlay,.player-wrap.touch-active .controls-overlay,.controls-overlay.force-show{opacity:1}

.ctrl-btn{width:2rem;height:2rem;display:flex;align-items:center;justify-content:center;background:var(--glass2);border-radius:var(--radius-xs);font-size:.85rem;transition:all .15s;flex-shrink:0}
.ctrl-btn:hover{background:var(--purple);color:#fff}
.ctrl-btn.active{background:var(--purple);color:#fff}
.ctrl-channel-info{flex:1;min-width:0;display:flex;align-items:center;gap:.4rem;overflow:hidden}
.ctrl-ch-logo{width:1.4rem;height:1.4rem;border-radius:2px;object-fit:contain;flex-shrink:0;background:var(--glass2)}
.ctrl-ch-name{font-size:.75rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctrl-ch-nameFallback{width:1.4rem;height:1.4rem;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;background:var(--purple);color:#fff;flex-shrink:0}

/* Server indicator */
.server-badge{position:absolute;top:.5rem;right:.5rem;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);padding:.2rem .5rem;border-radius:var(--radius-xs);font-size:.65rem;color:#60a5fa;z-index:12;display:flex;align-items:center;gap:.3rem}
.server-dot{width:5px;height:5px;border-radius:50%;background:#4ade80;animation:breathe 2s infinite}

/* Channel info overlay */
.ch-info-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);backdrop-filter:blur(16px);padding:1rem 1.5rem;border-radius:var(--radius);text-align:center;z-index:18;opacity:0;transition:opacity .4s;pointer-events:none}
.ch-info-overlay.show{opacity:1}
.ch-info-overlay .ch-info-logo{width:3rem;height:3rem;border-radius:.5rem;object-fit:contain;margin:0 auto .5rem;background:var(--glass2)}
.ch-info-overlay .ch-info-name{font-size:1.1rem;font-weight:700}
.ch-info-overlay .ch-info-group{font-size:.75rem;color:var(--text2);margin-top:.2rem}

/* Error overlay */
.error-overlay{position:absolute;inset:0;background:rgba(0,0,0,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;z-index:20;opacity:0;pointer-events:none;transition:opacity .3s}
.error-overlay.show{opacity:1;pointer-events:auto}
.error-overlay .err-icon{font-size:2rem}
.error-overlay .err-msg{font-size:.85rem;color:var(--text2);text-align:center;max-width:80%}
.error-overlay .err-btn{padding:.4rem 1rem;background:var(--purple);color:#fff;border-radius:var(--radius-sm);font-size:.8rem;font-weight:600;transition:background .2s}
.error-overlay .err-btn:hover{background:#7c3aed}

/* Category Tabs */
.cat-tabs{display:flex;gap:.35rem;padding:.5rem .75rem;overflow-x:auto;flex-shrink:0;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,.06);scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:.3rem .7rem;border-radius:var(--radius-sm);font-size:.72rem;font-weight:600;white-space:nowrap;background:var(--glass);border:1px solid rgba(255,255,255,.06);transition:all .2s;flex-shrink:0;display:flex;align-items:center;gap:.3rem}
.cat-tab:hover{background:var(--glass2)}
.cat-tab.active{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 2px 12px var(--purple-glow)}
.cat-tab .tab-emoji{font-size:.8rem}

/* Mobile channel list */
.mobile-ch-list{display:none;flex:1;overflow-y:auto;padding:.5rem}

/* Right Panel - Channel List */
.right-panel{flex:4;display:flex;flex-direction:column;overflow:hidden;border-left:1px solid rgba(255,255,255,.06);background:var(--bg2)}
.panel-header{padding:.5rem .75rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.panel-title{font-size:.8rem;font-weight:700;color:var(--text2)}
.panel-count{font-size:.65rem;color:var(--purple);font-weight:600}

.ch-list{flex:1;overflow-y:auto;padding:.5rem;display:flex;flex-direction:column;gap:.35rem}

/* Channel Card */
.ch-card{display:flex;align-items:center;gap:.5rem;padding:.45rem .55rem;border-radius:var(--radius-sm);background:var(--glass);border:1px solid transparent;cursor:pointer;transition:all .2s;position:relative}
.ch-card:hover{background:var(--glass2);border-color:rgba(255,255,255,.08)}
.ch-card.active{background:var(--purple-dim);border-color:var(--purple);animation:pulseGlow 2.5s infinite}
.ch-card .ch-num{width:1.4rem;font-size:.6rem;font-weight:700;color:var(--text2);text-align:center;flex-shrink:0}
.ch-card .ch-logo-wrap{width:2rem;height:2rem;border-radius:.3rem;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--glass2)}
.ch-card .ch-logo{width:100%;height:100%;object-fit:contain}
.ch-card .ch-logo-fallback{font-size:.7rem;font-weight:700;color:var(--purple)}
.ch-card .ch-info{flex:1;min-width:0}
.ch-card .ch-name{font-size:.75rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-card .ch-group{font-size:.6rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-card .ch-servers{font-size:.55rem;color:var(--purple);font-weight:600;flex-shrink:0}
.ch-card .pulse-dot{position:absolute;right:.4rem;top:.4rem;width:6px;height:6px;border-radius:50%;background:var(--purple);animation:pulseGlow 2s infinite}

/* Server list popup */
.server-popup{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.server-popup.show{opacity:1;pointer-events:auto}
.server-popup-inner{background:var(--bg2);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius);padding:1rem;width:90%;max-width:320px;max-height:70vh;overflow-y:auto}
.server-popup-inner h3{font-size:.9rem;font-weight:700;margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem}
.srv-item{display:flex;align-items:center;gap:.5rem;padding:.45rem .6rem;border-radius:var(--radius-xs);background:var(--glass);margin-bottom:.35rem;cursor:pointer;transition:all .2s;border:1px solid transparent}
.srv-item:hover{background:var(--glass2)}
.srv-item.active{border-color:var(--purple);background:var(--purple-dim)}
.srv-item .srv-dot{width:6px;height:6px;border-radius:50%;background:var(--text2);flex-shrink:0}
.srv-item.active .srv-dot{background:#4ade80}
.srv-item .srv-name{font-size:.78rem;font-weight:600}
.srv-item .srv-status{font-size:.6rem;color:var(--text2);margin-left:auto}

/* Footer */
.footer{padding:.35rem .75rem;background:var(--bg2);border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;gap:.5rem;font-size:.65rem;color:var(--text2);flex-shrink:0}
.footer a{color:var(--purple);text-decoration:none;font-weight:600}
.footer a:hover{text-decoration:underline}

/* Loading state */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;padding:2rem}
.spinner{width:1.5rem;height:1.5rem;border:2px solid var(--glass3);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}

/* Responsive */
@media(max-width:900px){
  .main{flex-direction:column}
  .right-panel{flex:none;border-left:none;border-top:1px solid rgba(255,255,255,.06);max-height:40vh}
  .player-wrap{max-height:35vh}
  .left-panel{flex:1}
}
@media(max-width:600px){
  .header{gap:.35rem;padding:.4rem .5rem}
  .logo-text{font-size:.9rem}
  .search-box{max-width:160px}
  .right-panel{max-height:45vh}
  .player-wrap{max-height:30vh;aspect-ratio:16/9}
  .cat-tabs{padding:.35rem .5rem}
  .cat-tab{padding:.25rem .5rem;font-size:.65rem}
  .ch-card{padding:.35rem .4rem;gap:.35rem}
  .ch-card .ch-logo-wrap{width:1.6rem;height:1.6rem}
  .ch-card .ch-name{font-size:.7rem}
}

/* Fullscreen */
.player-wrap:fullscreen,.player-wrap:-webkit-full-screen{max-height:none;aspect-ratio:unset;width:100%;height:100%}
.player-wrap:fullscreen video,.player-wrap:-webkit-full-screen video{width:100%;height:100%}

/* Focus styles for keyboard nav */
.ch-card.focused{outline:2px solid var(--purple);outline-offset:-2px}
.cat-tab.focused{outline:2px solid var(--purple);outline-offset:-2px}

/* Landscape on mobile */
@media(orientation:landscape) and (max-height:500px){
  .header,.footer,.cat-tabs,.right-panel{display:none!important}
  .main{flex-direction:row}
  .left-panel{flex:1}
  .player-wrap{max-height:none;aspect-ratio:unset;height:100vh}
}
</style>
</head>

      </div>
      <div class="ch-list" id="chList"></div>

  </div>

  <!-- Footer -->
  <footer class="footer">
    <span>Shovon IPTV Pro • <span id="footerCount">0</span> Channels • Developed by SRP Soft Ltd.</span>
    <a href="https://wa.me/8801843860547" target="_blank" rel="noopener">💬 WhatsApp</a>
  </footer>
</div>

<!-- Server Popup -->
<div class="server-popup" id="serverPopup">
  <div class="server-popup-inner">
    <h3>📡 Select Server</h3>
    <div id="serverList"></div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // State
  var allChannels = [];
  var filteredChannels = [];
  var currentChannel = null;
  var currentServerIdx = 0;
  var activeGroup = 'all';
  var searchQuery = '';
  var hls = null;
  var retryCount = 0;
  var maxRetries = 3;
  var controlsTimer = null;
  var chInfoTimer = null;
  var focusedIdx = -1;
  var isZoomed = false;

  // DOM
  var video = document.getElementById('video');
  var playerWrap = document.getElementById('playerWrap');
  var bufferBar = document.getElementById('bufferBar');
  var serverBadge = document.getElementById('serverBadge');
  var serverBadgeText = document.getElementById('serverBadgeText');
  var chInfoOverlay = document.getElementById('chInfoOverlay');
  var chInfoLogo = document.getElementById('chInfoLogo');
  var chInfoName = document.getElementById('chInfoName');
  var chInfoGroup = document.getElementById('chInfoGroup');
  var errorOverlay = document.getElementById('errorOverlay');
  var errMsg = document.getElementById('errMsg');
  var errNextBtn = document.getElementById('errNextBtn');
  var controlsOverlay = document.getElementById('controlsOverlay');
  var ctrlLogo = document.getElementById('ctrlLogo');
  var ctrlLogoFallback = document.getElementById('ctrlLogoFallback');
  var ctrlChName = document.getElementById('ctrlChName');
  var catTabs = document.getElementById('catTabs');
  var chList = document.getElementById('chList');
  var searchInput = document.getElementById('searchInput');
  var chCountEl = document.getElementById('chCount');
  var panelCount = document.getElementById('panelCount');
  var footerCount = document.getElementById('footerCount');
  var serverPopup = document.getElementById('serverPopup');
  var serverListEl = document.getElementById('serverList');

  // Group icon mapping
  var groupIcons = {
    'TV':'📺','News':'📻','Sports':'⚽','Movies':'🎬','Music':'🎵',
    'Kids':'👶','Documentary':'📖','Entertainment':'🎭','Religious':'🕌',
    'International':'🌐','Indonesian TV':'📺','Indonesian News':'📻',
    'Indonesian Sports':'⚽','Indonesian Movies':'🎬','Indonesian Music':'🎵',
    'Indonesian Kids':'👶','Indonesian Lifestyle':'📖','Indonesian Entertainment':'🎭',
    'Indonesian Religious':'🕌'
  };

  // Init
  function init(){
    parseChannels();
    renderCatTabs();
    filterChannels();
    updateCounts();
    bindEvents();
    // Auto-play first channel
    if(allChannels.length > 0){
      playChannel(allChannels[0]);
    }
  }

  // Parse channel data
  function parseChannels(){
    var data = CHANNEL_DATA;
    if(!data || !data.g) return;
    var idx = 0;
    data.g.forEach(function(group){
      group.c.forEach(function(ch){
        allChannels.push({
          name: ch.n,
          logo: ch.l || '',
          group: ch.g || group.n,
          servers: (ch.s || []).map(function(s){ return {name:s[0], url:s[1]}; }),
          emoji: group.e,
          idx: idx++
        });
      });
    });
  }

  // Render category tabs
  function renderCatTabs(){
    var data = CHANNEL_DATA;
    if(!data || !data.g) return;
    var html = '<button class="cat-tab active" data-group="all"><span class="tab-emoji">📺</span>All ('+data.t+')</button>';
    data.g.forEach(function(group){
      var icon = groupIcons[group.n] || group.e || '📺';
      html += '<button class="cat-tab" data-group="'+escHtml(group.n)+'"><span class="tab-emoji">'+icon+'</span>'+escHtml(group.n)+' ('+group.c.length+')</button>';
    });
    catTabs.innerHTML = html;
  }

  // Filter channels
  function filterChannels(){
    filteredChannels = allChannels.filter(function(ch){
      var matchGroup = (activeGroup === 'all') || (ch.group === activeGroup);
      if(!matchGroup) return false;
      if(searchQuery){
        var q = searchQuery.toLowerCase();
        return ch.name.toLowerCase().indexOf(q) !== -1 || ch.group.toLowerCase().indexOf(q) !== -1;
      }
      return true;
    });
    renderChannelList();
    panelCount.textContent = filteredChannels.length;
  }

  // Render channel list
  function renderChannelList(){
    var html = '';
    if(filteredChannels.length === 0){
      html = '<div class="loading-state"><div style="font-size:1.5rem">📭</div><div style="font-size:.8rem;color:var(--text2)">No channels found</div></div>';
    } else {
      filteredChannels.forEach(function(ch, i){
        var isActive = currentChannel && currentChannel.idx === ch.idx;
        var logoHtml = ch.logo
          ? '<img class="ch-logo" src="'+escHtml(ch.logo)+'" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><span class="ch-logo-fallback" style="display:none">'+escHtml(ch.name.charAt(0))+'</span>'
          : '<span class="ch-logo-fallback">'+escHtml(ch.name.charAt(0))+'</span>';
        html += '<div class="ch-card'+(isActive?' active':'')+'" data-idx="'+ch.idx+'" data-fi="'+i+'">'
          + '<span class="ch-num">'+(i+1)+'</span>'
          + '<div class="ch-logo-wrap">'+logoHtml+'</div>'
          + '<div class="ch-info"><div class="ch-name">'+escHtml(ch.name)+'</div><div class="ch-group">'+escHtml(ch.group)+'</div></div>'
          + '<span class="ch-servers">'+ch.servers.length+'srv</span>'
          + (isActive ? '<span class="pulse-dot"></span>' : '')
          + '</div>';
      });
    }
    chList.innerHTML = html;
  }

  // Play channel
  function playChannel(ch, serverIdx){
    if(!ch || !ch.servers || ch.servers.length === 0) return;
    currentChannel = ch;
    currentServerIdx = (typeof serverIdx === 'number') ? serverIdx : 0;
    retryCount = 0;
    loadStream(ch.servers[currentServerIdx].url);
    updateUI();
    showChannelInfo(ch);
    // Scroll to active channel in list
    var activeCard = chList.querySelector('.ch-card.active');
    if(activeCard) activeCard.scrollIntoView({block:'nearest',behavior:'smooth'});
  }

  // Load HLS stream
  function loadStream(url){
    destroyHls();
    hideError();
    showBuffer(true);

    if(Hls.isSupported()){
      hls = new Hls({
        enableWorker: true,
        lowLatencyMode: true,
        maxBufferLength: 30,
        maxMaxBufferLength: 60,
        startLevel: -1
      });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function(){
        showBuffer(false);
        video.play().catch(function(){});
      });
      hls.on(Hls.Events.ERROR, function(event, data){
        if(data.fatal){
          showBuffer(false);
          switch(data.type){
            case Hls.ErrorTypes.NETWORK_ERROR:
              tryNextServer('Network error');
              break;
            case Hls.ErrorTypes.MEDIA_ERROR:
              hls.recoverMediaError();
              break;
            default:
              tryNextServer('Fatal error');
              break;
          }
        }
      });
      hls.on(Hls.Events.FRAG_BUFFERED, function(){
        showBuffer(false);
      });
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      // Native HLS (Safari)
      video.src = url;
      video.addEventListener('loadedmetadata', function(){
        showBuffer(false);
        video.play().catch(function(){});
      }, {once:true});
      video.addEventListener('error', function(){
        tryNextServer('Playback error');
      }, {once:true});
    } else {
      showError('HLS not supported in this browser');
    }
  }

  function destroyHls(){
    if(hls){
      hls.destroy();
      hls = null;
    }
    video.removeAttribute('src');
    video.load();
  }

  function tryNextServer(reason){
    retryCount++;
    if(retryCount > maxRetries || !currentChannel){
      showError(reason || 'Stream unavailable');
      return;
    }
    currentServerIdx = (currentServerIdx + 1) % currentChannel.servers.length;
    serverBadgeText.textContent = currentChannel.servers[currentServerIdx].name;
    loadStream(currentChannel.servers[currentServerIdx].url);
  }

  // UI updates
  function updateUI(){
    if(!currentChannel) return;
    // Server badge
    serverBadge.style.display = 'flex';
    serverBadgeText.textContent = currentChannel.servers[currentServerIdx].name;
    // Controls channel info
    ctrlChName.textContent = currentChannel.name;
    if(currentChannel.logo){
      ctrlLogo.src = currentChannel.logo;
      ctrlLogo.style.display = 'block';
      ctrlLogoFallback.style.display = 'none';
      ctrlLogo.onerror = function(){
        ctrlLogo.style.display = 'none';
        ctrlLogoFallback.textContent = currentChannel.name.charAt(0);
        ctrlLogoFallback.style.display = 'flex';
      };
    } else {
      ctrlLogo.style.display = 'none';
      ctrlLogoFallback.textContent = currentChannel.name.charAt(0);
      ctrlLogoFallback.style.display = 'flex';
    }
    // Re-render channel list to update active
    renderChannelList();
  }

  function showChannelInfo(ch){
    chInfoName.textContent = ch.name;
    chInfoGroup.textContent = ch.group;
    if(ch.logo){
      chInfoLogo.src = ch.logo;
      chInfoLogo.style.display = 'block';
      chInfoLogo.onerror = function(){ chInfoLogo.style.display = 'none'; };
    } else {
      chInfoLogo.style.display = 'none';
    }
    chInfoOverlay.classList.add('show');
    clearTimeout(chInfoTimer);
    chInfoTimer = setTimeout(function(){
      chInfoOverlay.classList.remove('show');
    }, 4000);
  }

  function showBuffer(show){
    bufferBar.classList.toggle('active', show);
  }

  function showError(msg){
    errMsg.textContent = msg || 'Stream unavailable';
    errorOverlay.classList.add('show');
  }

  function hideError(){
    errorOverlay.classList.remove('show');
  }

  function updateCounts(){
    var total = allChannels.length;
    chCountEl.textContent = total + ' CH';
    footerCount.textContent = total;
  }

  // Server popup
  function showServerPopup(){
    if(!currentChannel) return;
    var html = '';
    currentChannel.servers.forEach(function(srv, i){
      var isActive = i === currentServerIdx;
      html += '<div class="srv-item'+(isActive?' active':'')+'" data-srv="'+i+'">'
        + '<span class="srv-dot"></span>'
        + '<span class="srv-name">'+escHtml(srv.name)+'</span>'
        + (isActive ? '<span class="srv-status">● Active</span>' : '')
        + '</div>';
    });
    serverListEl.innerHTML = html;
    serverPopup.classList.add('show');
  }

  function hideServerPopup(){
    serverPopup.classList.remove('show');
  }

  // Controls auto-hide
  function showControls(){
    controlsOverlay.classList.add('force-show');
    clearTimeout(controlsTimer);
    controlsTimer = setTimeout(function(){
      controlsOverlay.classList.remove('force-show');
    }, 3500);
  }

  // Event bindings
  function bindEvents(){
    // Search
    searchInput.addEventListener('input', function(){
      searchQuery = this.value.trim();
      filterChannels();
    });

    // Category tabs
    catTabs.addEventListener('click', function(e){
      var tab = e.target.closest('.cat-tab');
      if(!tab) return;
      activeGroup = tab.dataset.group;
      catTabs.querySelectorAll('.cat-tab').forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      filterChannels();
    });

    // Channel list clicks
    chList.addEventListener('click', function(e){
      var card = e.target.closest('.ch-card');
      if(!card) return;
      var idx = parseInt(card.dataset.idx);
      var ch = allChannels.find(function(c){ return c.idx === idx; });
      if(ch) playChannel(ch);
    });

    // CH+/CH- buttons
    document.getElementById('chPrev').addEventListener('click', function(){ navChannel(-1); });
    document.getElementById('chNext').addEventListener('click', function(){ navChannel(1); });

    // Player controls
    document.getElementById('btnPlay').addEventListener('click', togglePlay);
    document.getElementById('btnMute').addEventListener('click', toggleMute);
    document.getElementById('btnFit').addEventListener('click', toggleZoom);
    document.getElementById('btnLandscape').addEventListener('click', goLandscape);
    document.getElementById('btnNextSrv').addEventListener('click', nextServer);
    document.getElementById('btnSrvList').addEventListener('click', showServerPopup);
    document.getElementById('btnFullscreen').addEventListener('click', toggleFullscreen);

    // Error next server
    errNextBtn.addEventListener('click', function(){
      retryCount = 0;
      tryNextServer('Retrying...');
    });

    // Server popup
    serverPopup.addEventListener('click', function(e){
      if(e.target === serverPopup){ hideServerPopup(); return; }
      var item = e.target.closest('.srv-item');
      if(!item) return;
      var srvIdx = parseInt(item.dataset.srv);
      if(currentChannel){
        currentServerIdx = srvIdx;
        retryCount = 0;
        loadStream(currentChannel.servers[srvIdx].url);
        updateUI();
        hideServerPopup();
      }
    });

    // Player touch/click for controls
    playerWrap.addEventListener('click', function(e){
      if(e.target.closest('.controls-overlay') || e.target.closest('.error-overlay')) return;
      showControls();
    });
    playerWrap.addEventListener('touchstart', function(){
      playerWrap.classList.add('touch-active');
      showControls();
    }, {passive:true});

    // Mouse move on player
    playerWrap.addEventListener('mousemove', showControls);

    // Video events
    video.addEventListener('waiting', function(){ showBuffer(true); });
    video.addEventListener('playing', function(){ showBuffer(false); hideError(); });
    video.addEventListener('pause', function(){
      document.getElementById('btnPlay').textContent = '▶';
    });
    video.addEventListener('play', function(){
      document.getElementById('btnPlay').textContent = '⏸';
    });

    // Keyboard
    document.addEventListener('keydown', function(e){
      if(e.target.tagName === 'INPUT') return;
      switch(e.key){
        case 'ArrowUp': case 'ArrowLeft':
          e.preventDefault(); navChannel(-1); break;
        case 'ArrowDown': case 'ArrowRight':
          e.preventDefault(); navChannel(1); break;
        case 'PageUp':
          e.preventDefault(); navChannel(-10); break;
        case 'PageDown':
          e.preventDefault(); navChannel(10); break;
        case ' ':
          e.preventDefault(); togglePlay(); break;
        case 'm': case 'M':
          toggleMute(); break;
        case 'f': case 'F':
          toggleFullscreen(); break;
        case 'Escape':
          hideServerPopup(); break;
        case 'Enter':
          if(focusedIdx >= 0 && focusedIdx < filteredChannels.length){
            playChannel(filteredChannels[focusedIdx]);
          }
          break;
      }
    });

    // Double-click fullscreen
    video.addEventListener('dblclick', toggleFullscreen);
  }

  // Navigation
  function navChannel(dir){
    if(filteredChannels.length === 0) return;
    var curIdx = -1;
    if(currentChannel){
      curIdx = filteredChannels.findIndex(function(c){ return c.idx === currentChannel.idx; });
    }
    var newIdx = curIdx + dir;
    if(newIdx < 0) newIdx = filteredChannels.length - 1;
    if(newIdx >= filteredChannels.length) newIdx = 0;
    playChannel(filteredChannels[newIdx]);
  }

  function togglePlay(){
    if(video.paused) video.play().catch(function(){});
    else video.pause();
  }

  function toggleMute(){
    video.muted = !video.muted;
    document.getElementById('btnMute').textContent = video.muted ? '🔇' : '🔊';
  }

  function toggleZoom(){
    isZoomed = !isZoomed;
    video.classList.toggle('zoom-mode', isZoomed);
    document.getElementById('btnFit').textContent = isZoomed ? '⛶' : '⊡';
  }

  function goLandscape(){
    toggleFullscreen();
    if(screen.orientation && screen.orientation.lock){
      screen.orientation.lock('landscape').catch(function(){});
    }
  }

  function toggleFullscreen(){
    if(document.fullscreenElement || document.webkitFullscreenElement){
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    } else {
      var el = playerWrap;
      (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    }
  }

  function nextServer(){
    if(!currentChannel) return;
    currentServerIdx = (currentServerIdx + 1) % currentChannel.servers.length;
    retryCount = 0;
    loadStream(currentChannel.servers[currentServerIdx].url);
    updateUI();
  }

  // Utility
  function escHtml(s){
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Start
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
